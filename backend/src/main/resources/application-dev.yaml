spring:
  datasource:
    # Using the database credentials we set up in docker-compose.yml
    url: jdbc:postgresql://localhost:5432/soe_asset_db
    username: soe_admin
    password: soe_password
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway manages schema migrations, so we set Hibernate to validate the schema instead of trying to create or update it
    hibernate:
      ddl-auto: validate 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Set to true so Flyway can initialize smoothly
    baseline-on-migrate: true 

logging:
  level:
    vn.edu.hust.soict.soe.assetmanagement: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO