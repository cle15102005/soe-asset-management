spring:
  application:
    name: soe-asset-management

  datasource:
    url: jdbc:postgresql://localhost:5432/soe_asset_db
    username: soe_admin
    password: soe_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  error:
    include-message: always